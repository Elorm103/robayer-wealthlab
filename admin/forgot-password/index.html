<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Forgot Password | Robayer WealthLab Admin</title>
  <meta name="description" content="Reset your Robayer WealthLab admin password.">
  <link rel="canonical" href="https://robayerwealthlab.com/admin/forgot-password/">
  <meta name="robots" content="noindex, nofollow">

  <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32.png">
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=Space+Grotesk:wght@500&family=Work+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/utilities.css">
  <link rel="stylesheet" href="/css/admin.css">

  <style>
    .admin-login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--color-bg-alt);
      padding: var(--space-4);
    }
    .admin-login-card { width: 100%; max-width: 380px; }
    .admin-login-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      margin-bottom: var(--space-5);
      font-family: var(--font-display);
      font-weight: var(--weight-semibold);
      font-size: var(--text-h4);
      color: var(--color-ink-navy);
    }
    .admin-login-brand img { width: 28px; height: auto; }
  </style>
</head>
<body>
  <a href="#admin-forgot-heading" class="skip-link">Skip to form</a>
  <div class="admin-login-page">
    <div class="admin-login-card" id="admin-forgot-heading">
      <div class="admin-login-brand">
        <img src="/assets/branding/logo/logo-mark.png" alt="" width="415" height="355" loading="eager" decoding="async">
        <span>Robayer WealthLab Admin</span>
      </div>

      <div class="card">
        <h1 class="card__title mb-2">Reset your password</h1>
        <p class="text-small text-secondary mb-4">Enter your admin email and we'll send you a link to reset your password.</p>

        <form data-admin-forgot-form novalidate>
          <p class="alert alert--success" role="status" data-admin-forgot-success hidden>If that email is registered, a reset link is on its way. Check your inbox.</p>

          <div class="field" data-admin-forgot-field-group>
            <label class="field__label" for="admin-forgot-email">Email</label>
            <input class="field__input" type="email" id="admin-forgot-email" name="email" autocomplete="username" required>
          </div>

          <button type="submit" class="btn btn--primary btn--block" data-admin-forgot-field-group>Send reset link</button>
        </form>

        <p class="text-center text-small mt-3">
          <a href="/admin/login/">&larr; Back to sign in</a>
        </p>
      </div>
    </div>
  </div>

  <script src="/js/components/theme-toggle.js"></script>
  <script src="/js/components/admin/admin-auth.js"></script>
  <script src="/js/components/admin/admin-forgot-password.js"></script>
</body>
</html>
