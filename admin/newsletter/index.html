<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Newsletter | Robayer WealthLab Admin</title>
  <meta name="description" content="Draft, test, and send newsletter campaigns.">
  <link rel="canonical" href="https://robayerwealthlab.com/admin/newsletter/">
  <meta name="robots" content="noindex, nofollow">

  <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32.png">
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=Space+Grotesk:wght@500&family=Work+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/utilities.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div class="admin-shell" data-sidebar-collapsed="false">
    <div class="admin-include" data-include="/partials/admin-sidebar.html"></div>

    <div class="admin-main">
      <div class="admin-include" data-include="/partials/admin-topbar.html"></div>

      <main class="admin-content" id="main-content" data-campaigns-root>
        <p class="alert alert--error" role="alert" data-campaigns-load-error hidden></p>

        <div class="toolbar">
          <div class="toolbar__group">
            <span class="text-small text-secondary" data-campaigns-subscribed-count></span>
          </div>
          <div class="toolbar__group">
            <a href="/admin/newsletter/new/" class="btn btn--primary">New campaign</a>
          </div>
        </div>

        <div class="empty-state" data-campaigns-empty hidden>
          <svg class="icon empty-state__icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h16v16H4z"/><path d="m4 6 8 7 8-7"/></svg>
          <p class="empty-state__title">No campaigns yet</p>
          <p class="empty-state__body">Draft your first newsletter campaign — it stays a draft, and reaches no one, until you explicitly send it.</p>
        </div>

        <div class="admin-table-wrap" data-campaigns-table-wrap hidden>
          <table class="table" aria-label="Newsletter campaigns">
            <thead>
              <tr>
                <th scope="col">Subject</th>
                <th scope="col">Status</th>
                <th scope="col">Created by</th>
                <th scope="col">Sent by</th>
                <th scope="col">Created</th>
                <th scope="col">Sent</th>
                <th scope="col">Recipients</th>
                <th scope="col">Delivery</th>
                <th scope="col"><span class="sr-only">Actions</span></th>
              </tr>
            </thead>
            <tbody data-campaigns-table-body></tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <script src="/js/includes.js"></script>
  <script src="/js/components/theme-toggle.js"></script>
  <script src="/js/components/admin/admin-auth.js"></script>
  <script src="/js/components/admin/admin-shell.js"></script>
  <script src="/js/components/admin/admin-newsletter.js"></script>
</body>
</html>
