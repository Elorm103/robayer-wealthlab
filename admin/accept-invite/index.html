<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Accept Invitation | Robayer WealthLab Admin</title>
  <meta name="description" content="Set your password to join the Robayer WealthLab admin.">
  <link rel="canonical" href="https://robayerwealthlab.com/admin/accept-invite/">
  <meta name="robots" content="noindex, nofollow">

  <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32.png">
  <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;1,500&family=Space+Grotesk:wght@500&family=Work+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/utilities.css">
  <link rel="stylesheet" href="/css/admin.css">

  <style>
    .admin-login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--color-bg-alt);
      padding: var(--space-4);
    }
    .admin-login-card { width: 100%; max-width: 380px; }
    .admin-login-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      margin-bottom: var(--space-5);
      font-family: var(--font-display);
      font-weight: var(--weight-semibold);
      font-size: var(--text-h4);
      color: var(--color-ink-navy);
    }
    .admin-login-brand img { width: 28px; height: auto; }
  </style>
</head>
<body>
  <a href="#admin-invite-heading" class="skip-link">Skip to form</a>
  <div class="admin-login-page">
    <div class="admin-login-card" id="admin-invite-heading">
      <div class="admin-login-brand">
        <img src="/assets/branding/logo/logo-mark.png" alt="" width="415" height="355" loading="eager" decoding="async">
        <span>Robayer WealthLab Admin</span>
      </div>

      <div class="card">
        <h1 class="card__title mb-4" data-invite-title>You're invited</h1>

        <p class="alert alert--error" role="alert" data-invite-error hidden></p>
        <p class="alert alert--success" role="status" data-invite-success hidden>Your account is ready. You can now sign in.</p>
        <p class="text-secondary" data-invite-summary hidden></p>

        <form data-invite-accept-form novalidate>
          <div class="field">
            <label class="field__label" for="invite-accept-password">Choose a password</label>
            <input class="field__input" type="password" id="invite-accept-password" name="password" autocomplete="new-password" required minlength="12">
            <span class="field__hint">At least 12 characters.</span>
          </div>

          <div class="field">
            <label class="field__label" for="invite-accept-password-confirm">Confirm password</label>
            <input class="field__input" type="password" id="invite-accept-password-confirm" name="passwordConfirm" autocomplete="new-password" required minlength="12">
          </div>

          <button type="submit" class="btn btn--primary btn--block">Set password and join</button>
        </form>

        <p class="text-center text-small mt-3">
          <a href="/admin/login/">&larr; Back to sign in</a>
        </p>
      </div>
    </div>
  </div>

  <script src="/js/components/theme-toggle.js"></script>
  <script src="/js/components/admin/admin-auth.js"></script>
  <script src="/js/components/admin/admin-accept-invite.js"></script>
</body>
</html>
