<header class="site-header">
  <div class="container nav">
    <a href="/" class="nav__logo" aria-label="Robayer WealthLab — home">
      <img class="nav__logo-mark" src="/assets/branding/logo/logo-mark.png" alt="" width="415" height="355" loading="eager" decoding="async">
      <span data-content="company.name">Robayer WealthLab</span>
    </a>

    <button
      class="nav__toggle"
      type="button"
      aria-expanded="false"
      aria-controls="primary-nav"
      aria-label="Toggle navigation menu"
    >
      <svg width="20" height="20" viewBox="0 0 20 20" aria-hidden="true">
        <path d="M2 5h16M2 10h16M2 15h16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      </svg>
    </button>

    <div class="nav__menu" id="primary-nav">
      <ul class="nav__list">
        <li><a href="/books/">Books</a></li>
        <li><a href="/blog/">Blog</a></li>
        <li><a href="/resources/">Resources</a></li>
        <li><a href="/about/">About</a></li>
      </ul>
      <button
        class="theme-toggle"
        type="button"
        data-theme-toggle
        aria-pressed="false"
        aria-label="Toggle dark mode"
      >
        <svg class="icon theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2 12h2M20 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/>
        </svg>
        <svg class="icon theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5z"/>
        </svg>
      </button>

      <a href="/newsletter/" class="btn btn--primary nav__cta">Get one better money tip</a>
    </div>
  </div>
</header>
